services:
  app:
    container_name: clawmpany-app
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        - VITE_PRIVY_APP_ID=${VITE_PRIVY_APP_ID}
        - VITE_API_URL=${VITE_API_URL:-https://api.clawmpany.id}
    ports:
      - "5173:5173"
    restart: unless-stopped

  server:
    container_name: clawmpany-server
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - POCKETBASE_URL=http://pocketbase:8080
      - POCKETBASE_ADMIN_EMAIL=${POCKETBASE_ADMIN_EMAIL:-admin@example.com}
      - POCKETBASE_ADMIN_PASSWORD=${POCKETBASE_ADMIN_PASSWORD:-admin123}
      - PAYMENT_RECIPIENT_ADDRESS=${PAYMENT_RECIPIENT_ADDRESS}
    restart: unless-stopped

  pocketbase:
    container_name: clawmpany-pocketbase
    build:
      context: ./pocketbase
      dockerfile: Dockerfile
    ports:
      - "8090:8080"
    volumes:
      - ./pocketbase/pb_data:/pb/pb_data
      - ./pocketbase/pb_migrations:/pb/pb_migrations
    restart: unless-stopped
